name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test

      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm run typecheck > typecheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck log
        if: steps.typecheck.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Fail on typecheck errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
