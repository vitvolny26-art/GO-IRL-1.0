name: PLAN1152 temporary profile photo runner

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/plan1152-runner.yml
      - scripts/plan1152-profile-photo-controls.cjs

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Fetch patch script
        run: git show origin/tmp/plan1152-runner:scripts/plan1152-profile-photo-controls.cjs > /tmp/plan1152-profile-photo-controls.cjs
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply patch
        run: node /tmp/plan1152-profile-photo-controls.cjs
      - name: Test
        run: pnpm run test
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build
      - name: Push verified feature branch
        run: |
          git config user.name "GO IRL PLAN1152 Runner"
          git config user.email "goirl-plan1152@users.noreply.github.com"
          git checkout -b fix/profile-photo-controls
          git add src/App.tsx src/styles.css api/_shared/telegram-share-card-image.ts api/_shared/telegram-share-card-svg.ts api/_shared/telegram-share-card-image.test.ts
          git commit -m "fix: simplify profile photo controls"
          git push origin HEAD:refs/heads/fix/profile-photo-controls
