name: Apply event card backgrounds

on:
  push:
    branches:
      - fix/event-card-backgrounds
  pull_request:
    branches:
      - main
    paths:
      - scripts/patches/apply-event-card-backgrounds.cjs
      - .github/workflows/apply-event-card-backgrounds.yml

permissions:
  contents: write

concurrency:
  group: event-card-backgrounds
  cancel-in-progress: false

jobs:
  apply:
    runs-on: [self-hosted, Linux, X64, goirl]
    timeout-minutes: 45
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v5
        with:
          ref: fix/event-card-backgrounds
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply event card patch
        id: patch
        continue-on-error: true
        run: |
          mkdir -p .ci-bin
          cat > .ci-bin/curl <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          destination=""
          source_url=""
          while [ "$#" -gt 0 ]; do
            case "$1" in
              -o) destination="$2"; shift 2 ;;
              http*) source_url="$1"; shift ;;
              *) shift ;;
            esac
          done
          id="$(printf '%s' "$source_url" | sed -n 's/.*[?&]id=\([^&]*\).*/\1/p')"
          cookie="$(mktemp)"
          page="$(mktemp)"
          /usr/bin/curl -sS -L -c "$cookie" "https://drive.google.com/uc?export=download&id=$id" -o "$page"
          if unzip -t "$page" >/dev/null 2>&1; then mv "$page" "$destination"; rm -f "$cookie"; exit 0; fi
          values="$(python3 - "$page" <<'PY'
import re,sys
text=open(sys.argv[1],encoding='utf-8',errors='replace').read()
def field(name):
    match=re.search(r'name=["\x27]%s["\x27][^>]*value=["\x27]([^"\x27]+)' % name,text,re.I|re.S)
    if not match:
        match=re.search(r'value=["\x27]([^"\x27]+)["\x27][^>]*name=["\x27]%s["\x27]' % name,text,re.I|re.S)
    return match.group(1) if match else ''
print(field('confirm'))
print(field('uuid'))
PY
)"
          confirm="$(printf '%s\n' "$values" | sed -n '1p')"
          uuid="$(printf '%s\n' "$values" | sed -n '2p')"
          if [ -z "$confirm" ]; then
            echo "Drive response did not contain a confirmation form for file $id"
            file "$page" || true
            head -c 2000 "$page" || true
            echo
            exit 1
          fi
          download="https://drive.usercontent.google.com/download?id=$id&export=download&confirm=$confirm"
          if [ -n "$uuid" ]; then download="$download&uuid=$uuid"; fi
          /usr/bin/curl -fL -b "$cookie" "$download" -o "$destination"
          unzip -t "$destination" >/dev/null
          rm -f "$cookie" "$page"
          SH
          chmod +x .ci-bin/curl
          PATH="$PWD/.ci-bin:$PATH" node scripts/patches/apply-event-card-backgrounds.cjs > patch.log 2>&1

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: event-card-patch-log
          path: patch.log
          if-no-files-found: warn
          retention-days: 1

      - name: Stop on patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Finalize report
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/reports/2026-07-17-agent-report-event-backgrounds.md';
          let text = fs.readFileSync(path, 'utf8');
          text = text.replace('- Test: PENDING','- Test: PASS').replace('- Typecheck: PENDING','- Typecheck: PASS').replace('- Lint: PENDING','- Lint: PASS').replace('- Build: PENDING','- Build: PASS');
          fs.writeFileSync(path,text);
          NODE

      - name: Verify changed paths
        run: |
          rm -f patch.log
          bad=$(git status --short | awk '{print $2}' | grep -Ev '^(api/_shared/event-artwork\.ts|src/App\.tsx|src/main\.tsx|src/verticals/SportVertical\.tsx|src/components/EventCardArtwork\.tsx|src/components/EventCardPrimitives\.tsx|src/components/OrganizerProfilePortal\.tsx|src/eventBackgrounds\.ts|src/glass-event-card\.css|src/assets/event-backgrounds/[^/]+\.webp|docs/reports/2026-07-17-agent-report-event-backgrounds\.md|scripts/patches/apply-event-card-backgrounds\.cjs|\.github/workflows/apply-event-card-backgrounds\.yml)$' || true)
          if [ -n "$bad" ]; then echo "Unexpected changed paths:"; echo "$bad"; exit 1; fi
          count=$(find src/assets/event-backgrounds -maxdepth 1 -type f -name '*.webp' | wc -l)
          test "$count" -eq 40

      - name: Commit verified patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: apply event card visual fixes"
          git push origin HEAD:fix/event-card-backgrounds
