name: Self-hosted verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: self-hosted-verify
  cancel-in-progress: false

jobs:
  verify:
    if: github.repository == 'vitvolny26-art/GO-IRL-1.0'
    runs-on: [self-hosted, Linux, X64, goirl]
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
          clean: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
