<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0d" />
    <meta name="description" content="GO IRL — Меньше скролла, больше жизни." />
    <meta property="og:title" content="GO IRL" />
    <meta property="og:description" content="Меньше скролла, больше жизни." />
    <meta property="og:image" content="/brand/logo-wide.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GO IRL" />
    <meta name="twitter:description" content="Меньше скролла, больше жизни." />
    <meta name="twitter:image" content="/brand/logo-wide.png" />
    <meta name="go-irl-build" content="v0-auto-deploy-2026-07-03" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/brand/logo-square.png" />
    <title>GO IRL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  
    <button id="beta-build-marker" type="button" style="position:fixed;left:60px;top:24px;z-index:99999;font-size:12px;font-weight:700;line-height:1;background:#2563eb;color:#fff;padding:5px 10px;border:0;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,.28);cursor:pointer;user-select:none">BETA 9e25cbc</button>
    <div id="beta-dev-panel" style="display:none;position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.55)">
      <div style="position:absolute;left:0;right:0;bottom:0;background:#101214;color:#fff;border-radius:22px 22px 0 0;padding:18px;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;box-shadow:0 -8px 28px rgba(0,0,0,.35)">
        <div style="width:42px;height:4px;border-radius:999px;background:#3a3f46;margin:0 auto 14px"></div>
        <h3 style="margin:0 0 10px;font-size:18px">GO IRL DEV</h3>
        <div style="font-size:13px;opacity:.8;margin-bottom:14px">Commit: <b>9e25cbc</b><br>Built: 2026-07-08T12:25:14.106Z</div>
        <button data-dev-action="reload" style="width:100%;margin:6px 0;padding:13px;border:0;border-radius:14px;background:#2563eb;color:#fff;font-weight:700">Reload latest build</button>
        <button data-dev-action="commit" style="width:100%;margin:6px 0;padding:13px;border:0;border-radius:14px;background:#20242a;color:#fff">Copy commit</button>
        <button data-dev-action="debug" style="width:100%;margin:6px 0;padding:13px;border:0;border-radius:14px;background:#20242a;color:#fff">Copy debug info</button>
        <button data-dev-action="close" style="width:100%;margin:10px 0 0;padding:13px;border:0;border-radius:14px;background:#30343b;color:#fff">Close</button>
      </div>
    </div>
    <script>
      (() => {
        const commit = "9e25cbc";
        const builtAt = "2026-07-08T12:25:14.106Z";
        const badge = document.getElementById("beta-build-marker");
        const panel = document.getElementById("beta-dev-panel");
        const open = () => { if (panel) panel.style.display = "block"; };
        const close = () => { if (panel) panel.style.display = "none"; };
        const copy = async (text) => { try { await navigator.clipboard.writeText(text); } catch {} };
        const reload = () => {
          const url = new URL(window.location.href);
          url.searchParams.set("refresh", String(Date.now()));
          window.location.replace(url.toString());
        };

        badge?.addEventListener("click", open);
        panel?.addEventListener("click", async (event) => {
          if (event.target === panel) close();
          const action = event.target?.getAttribute?.("data-dev-action");
          if (action === "close") close();
          if (action === "reload") reload();
          if (action === "commit") await copy(commit);
          if (action === "debug") await copy(JSON.stringify({ app: "GO IRL", commit, builtAt, href: window.location.href, userAgent: navigator.userAgent }, null, 2));
        });
      })();
    </script>
  </body>
</html>
