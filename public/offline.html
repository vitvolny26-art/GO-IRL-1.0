<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0d" />
    <title>GO IRL — нет соединения</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #050607; color: #f7f8f9; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
      main { width: min(100%, 420px); text-align: center; }
      .logo { width: 112px; height: 112px; margin: 0 auto; display: grid; place-items: center; border: 1px solid #476015; border-radius: 24px; background: #10150a; color: #c9ff3d; font-size: 24px; font-weight: 900; }
      h1 { margin: 24px 0 8px; font-size: 28px; }
      p { margin: 0 0 24px; color: #aeb4bf; line-height: 1.5; }
      a { display: block; padding: 15px 20px; border-radius: 16px; background: #c9ff3d; color: #10130a; font-weight: 800; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-label="GO IRL">GO IRL</div>
      <h1>Нет соединения</h1>
      <p>Подключитесь к интернету и попробуйте открыть GO IRL снова.</p>
      <a href="/">Повторить</a>
    </main>
  </body>
</html>
