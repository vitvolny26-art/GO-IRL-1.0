<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#0b0e12" />
    <title>GO IRL — Share</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 50% 10%, #243017 0, #10150d 28%, #080a0d 72%); color: #f6f7f8; }
      main { width: min(100%, 420px); padding: 30px 24px 24px; border: 1px solid rgba(184, 255, 63, .28); border-radius: 28px; background: rgba(10, 13, 16, .9); box-shadow: 0 24px 70px rgba(0, 0, 0, .45); text-align: center; }
      .logo { display: inline-grid; place-items: center; width: 72px; height: 72px; margin-bottom: 18px; border-radius: 22px; background: #fff; }
      .logo img { width: 48px; height: 48px; }
      h1 { margin: 0; font-size: clamp(28px, 8vw, 38px); line-height: 1.05; letter-spacing: -.04em; }
      p { margin: 14px auto 0; max-width: 31ch; color: #b8bdc5; font-size: 16px; line-height: 1.5; }
      .event { margin: 22px 0; padding: 16px; border-radius: 18px; background: #14191f; text-align: left; }
      .event strong, .event span { display: block; overflow-wrap: anywhere; }
      .event strong { font-size: 18px; }
      .event span { margin-top: 5px; color: #969da7; font-size: 14px; }
      button { width: 100%; min-height: 56px; border: 0; border-radius: 17px; font: inherit; font-weight: 800; cursor: pointer; }
      #share { background: #b8ff3f; color: #10140b; font-size: 17px; }
      #copy { margin-top: 10px; background: transparent; color: #d8dce1; border: 1px solid #343a43; }
      #status { min-height: 24px; margin-top: 14px; color: #b8ff3f; font-size: 14px; }
    </style>
  </head>
  <body>
    <main>
      <span class="logo"><img src="/icons/messenger.svg" alt="" /></span>
      <h1 id="heading">Opening Messenger</h1>
      <p id="hint">If Messenger does not open automatically, tap the button below.</p>
      <section class="event" aria-label="Event">
        <strong id="event-title">GO IRL</strong>
        <span id="event-details"></span>
      </section>
      <button id="share" type="button">Open Messenger</button>
      <button id="copy" type="button">Copy invitation</button>
      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script>
      const translations = {
        ru: { heading: "Открываем Messenger", hint: "Если Messenger не открылся автоматически, нажмите кнопку ниже.", share: "Открыть Messenger", copy: "Скопировать приглашение", copied: "Приглашение скопировано", unavailable: "Не удалось открыть Messenger — приглашение можно скопировать" },
        uk: { heading: "Відкриваємо Messenger", hint: "Якщо Messenger не відкрився автоматично, натисніть кнопку нижче.", share: "Відкрити Messenger", copy: "Скопіювати запрошення", copied: "Запрошення скопійовано", unavailable: "Не вдалося відкрити Messenger — запрошення можна скопіювати" },
        cs: { heading: "Otevíráme Messenger", hint: "Pokud se Messenger neotevřel automaticky, klepněte na tlačítko níže.", share: "Otevřít Messenger", copy: "Kopírovat pozvánku", copied: "Pozvánka byla zkopírována", unavailable: "Messenger se nepodařilo otevřít — pozvánku lze zkopírovat" },
        en: { heading: "Opening Messenger", hint: "If Messenger does not open automatically, tap the button below.", share: "Open Messenger", copy: "Copy invitation", copied: "Invitation copied", unavailable: "Could not open Messenger — you can copy the invitation" }
      };
      const language = (navigator.language || "en").slice(0, 2).toLowerCase();
      const t = translations[language] || translations.en;
      const params = new URLSearchParams(location.search);
      const content = {
        title: params.get("title") || "GO IRL",
        date: params.get("date") || "",
        address: params.get("address") || "",
        url: params.get("url") || ""
      };
      const text = [`GO IRL: ${content.title}`, content.date, content.address].filter(Boolean).join("\n");
      const status = document.querySelector("#status");
      document.documentElement.lang = language;
      document.querySelector("#heading").textContent = t.heading;
      document.querySelector("#hint").textContent = t.hint;
      document.querySelector("#share").textContent = t.share;
      document.querySelector("#copy").textContent = t.copy;
      document.querySelector("#event-title").textContent = content.title;
      document.querySelector("#event-details").textContent = [content.date, content.address].filter(Boolean).join(" · ");

      const copy = async () => {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
      };

      const openMessenger = () => {
        if (!content.url) return false;
        const link = encodeURIComponent(content.url);
        const appId = "1348703396728256";
        if (/android/i.test(navigator.userAgent)) {
          location.href = `intent://share/?link=${link}&app_id=${appId}#Intent;scheme=fb-messenger;package=com.facebook.orca;end`;
          return true;
        }
        if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
          location.href = `fb-messenger://share/?link=${link}&app_id=${appId}`;
          return true;
        }
        return false;
      };

      document.querySelector("#share").addEventListener("click", async () => {
        if (openMessenger()) return;
        if (navigator.share) {
          try {
            await navigator.share({ title: `GO IRL: ${content.title}`, text, url: content.url });
            return;
          } catch (error) {
            if (error && error.name === "AbortError") return;
          }
        }
        status.textContent = t.unavailable;
      });

      document.querySelector("#copy").addEventListener("click", async () => {
        await copy();
        status.textContent = t.copied;
      });

      if (/android|iphone|ipad|ipod/i.test(navigator.userAgent)) {
        window.setTimeout(() => openMessenger(), 120);
      }
    </script>
  </body>
</html>
